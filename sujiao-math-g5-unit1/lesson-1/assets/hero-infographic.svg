<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbf0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tempGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b" />
      <stop offset="50%" style="stop-color:#ffe66d" />
      <stop offset="100%" style="stop-color:#4ecdc4" />
    </linearGradient>
    <linearGradient id="altGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb" />
      <stop offset="45%" style="stop-color:#b0e0e6" />
      <stop offset="50%" style="stop-color:#4682b4" />
      <stop offset="100%" style="stop-color:#2c5f8a" />
    </linearGradient>
  </defs>
  
  <rect width="880" height="400" fill="url(#bgGrad)" rx="16" />
  
  <!-- Title -->
  <text x="440" y="35" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="18" font-weight="700" fill="#333">正数、负数与0 — 生活中的分界线</text>
  
  <!-- Left: Temperature section -->
  <g transform="translate(60, 60)">
    <text x="130" y="20" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#ff6b6b">温度计</text>
    
    <!-- Thermometer 1: Hot -->
    <rect x="30" y="40" width="30" height="180" rx="15" fill="#fff" stroke="#ddd" stroke-width="2" />
    <rect x="35" y="50" width="20" height="50" rx="10" fill="#ff6b6b" />
    <circle cx="45" cy="230" r="20" fill="#ff6b6b" stroke="#ddd" stroke-width="2" />
    <text x="45" y="285" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ff6b6b">+20°C</text>
    <text x="45" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">三亚</text>
    
    <!-- Thermometer 2: Zero -->
    <rect x="115" y="40" width="30" height="180" rx="15" fill="#fff" stroke="#ddd" stroke-width="2" />
    <rect x="120" y="125" width="20" height="5" rx="2.5" fill="#ffe66d" />
    <circle cx="130" cy="230" r="20" fill="#ffe66d" stroke="#ddd" stroke-width="2" />
    <text x="130" y="285" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">0°C</text>
    <text x="130" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">南京</text>
    
    <!-- Thermometer 3: Cold -->
    <rect x="200" y="40" width="30" height="180" rx="15" fill="#fff" stroke="#ddd" stroke-width="2" />
    <rect x="205" y="185" width="20" height="30" rx="10" fill="#4ecdc4" />
    <circle cx="215" cy="230" r="20" fill="#4ecdc4" stroke="#ddd" stroke-width="2" />
    <text x="215" y="285" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#4ecdc4">-5°C</text>
    <text x="215" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">北京</text>
    
    <!-- Arrow -->
    <line x1="30" y1="125" x2="230" y2="125" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3" />
    <text x="130" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ff6b6b">0°C 分界线</text>
  </g>
  
  <!-- Divider -->
  <line x1="440" y1="60" x2="440" y2="340" stroke="#ffe0b2" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- Right: Altitude section -->
  <g transform="translate(470, 60)">
    <text x="180" y="20" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#4ecdc4">海拔高度</text>
    
    <!-- Altitude background -->
    <rect x="20" y="40" width="320" height="250" fill="url(#altGrad)" rx="12" />
    
    <!-- Mountain -->
    <polygon points="60,120 100,70 140,120" fill="#8b7355" opacity="0.8" />
    <polygon points="80,120 100,70 100,120" fill="#a0826d" opacity="0.6" />
    <text x="100" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">+8848m</text>
    
    <!-- Hill -->
    <polygon points="160,160 200,130 240,160" fill="#6b8e23" opacity="0.7" />
    <text x="200" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">+3196m</text>
    
    <!-- Sea level line -->
    <line x1="20" y1="165" x2="340" y2="165" stroke="#ff6b6b" stroke-width="2" />
    <text x="330" y="160" text-anchor="end" font-family="sans-serif" font-size="10" fill="#ff6b6b" font-weight="600">海平面 0m</text>
    
    <!-- Below sea level markers -->
    <rect x="60" y="200" width="40" height="30" rx="5" fill="#2c5f8a" opacity="0.6" />
    <text x="80" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">-154m</text>
    <text x="80" y="245" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ccc">吐鲁番</text>
    
    <rect x="200" y="220" width="50" height="40" rx="5" fill="#1a3a5c" opacity="0.7" />
    <text x="225" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">-430m</text>
    <text x="225" y="275" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ccc">死海</text>
  </g>
  
  <!-- Bottom: Key concept -->
  <rect x="60" y="355" width="760" height="35" rx="10" fill="rgba(255,107,107,0.06)" stroke="rgba(255,107,107,0.15)" stroke-width="1" />
  <text x="440" y="378" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#555">
    <tspan fill="#ff6b6b" font-weight="700">正数（+）</tspan>
    <tspan fill="#888"> · </tspan>
    <tspan fill="#f59e0b" font-weight="700">0（分界）</tspan>
    <tspan fill="#888"> · </tspan>
    <tspan fill="#4ecdc4" font-weight="700">负数（-）</tspan>
  </text>
</svg>
