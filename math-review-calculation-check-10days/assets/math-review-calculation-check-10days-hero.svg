<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#FF8E53"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff8f0" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
    <filter id="btnShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="24"/>
  
  <!-- Decorative circles -->
  <circle cx="680" cy="100" r="80" fill="#ffffff12"/>
  <circle cx="100" cy="340" r="60" fill="#ffffff12"/>
  <circle cx="750" cy="350" r="40" fill="#ffffff10"/>
  <circle cx="50" cy="80" r="30" fill="#ffffff15"/>

  <!-- Left: Calculator illustration -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="140" height="200" rx="16" fill="white" filter="url(#shadow)"/>
    <rect x="0" y="0" width="140" height="45" rx="16" fill="#FF8E53"/>
    <rect x="0" y="29" width="140" height="16" fill="#FF8E53"/>
    <text x="70" y="30" text-anchor="middle" font-family="monospace" font-size="18" fill="white" font-weight="bold">247+568=?</text>
    <!-- Buttons -->
    <g transform="translate(10,55)">
      <rect x="0" y="0" width="55" height="30" rx="8" fill="#4ecdc4"/>
      <text x="27" y="21" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="sans-serif">7</text>
      <rect x="65" y="0" width="55" height="30" rx="8" fill="#4ecdc4"/>
      <text x="92" y="21" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="sans-serif">8</text>
      <rect x="0" y="40" width="55" height="30" rx="8" fill="#feca57"/>
      <text x="27" y="61" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="sans-serif">4</text>
      <rect x="65" y="40" width="55" height="30" rx="8" fill="#feca57"/>
      <text x="92" y="61" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="sans-serif">5</text>
      <rect x="0" y="80" width="55" height="30" rx="8" fill="#ff6b6b"/>
      <text x="27" y="101" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="sans-serif">1</text>
      <rect x="65" y="80" width="55" height="30" rx="8" fill="#ff6b6b"/>
      <text x="92" y="101" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="sans-serif">2</text>
      <rect x="0" y="120" width="55" height="30" rx="8" fill="#a29bfe"/>
      <text x="27" y="141" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="sans-serif">✓</text>
      <rect x="65" y="120" width="55" height="30" rx="8" fill="#a29bfe"/>
      <text x="92" y="141" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="sans-serif">✓</text>
    </g>
  </g>

  <!-- Right: Checkmark badges -->
  <g transform="translate(580, 100)">
    <circle cx="60" cy="30" r="35" fill="white" filter="url(#shadow)"/>
    <polyline points="40,30 55,48 82,15" fill="none" stroke="#2ecc71" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <circle cx="60" cy="110" r="30" fill="white" filter="url(#shadow)"/>
    <polyline points="42,110 55,125 78,98" fill="none" stroke="#2ecc71" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="60" cy="180" r="25" fill="white" filter="url(#shadow)"/>
    <polyline points="45,180 56,192 75,168" fill="none" stroke="#2ecc71" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Center card -->
  <g transform="translate(220, 110)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="200" rx="20" fill="url(#cardGrad)"/>
    <!-- Title -->
    <text x="170" y="42" text-anchor="middle" font-family="'PingFang SC','Source Han Sans SC',sans-serif" font-size="26" fill="#4a3f35" font-weight="900">10天验算训练营</text>
    <text x="170" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8c7d6b">小学3-4年级 · 万以内加减法</text>
    
    <!-- Divider -->
    <line x1="40" y1="92" x2="300" y2="92" stroke="#ffe4c4" stroke-width="1.5"/>
    
    <!-- Features -->
    <g transform="translate(40, 108)">
      <circle cx="8" cy="0" r="6" fill="#4ecdc4"/>
      <text x="22" y="5" font-family="sans-serif" font-size="14" fill="#5a4d3e">自动批改 · 错题追踪</text>
      <circle cx="8" cy="28" r="6" fill="#feca57"/>
      <text x="22" y="33" font-family="sans-serif" font-size="14" fill="#5a4d3e">AI学伴 · 一键出题</text>
      <circle cx="8" cy="56" r="6" fill="#a29bfe"/>
      <text x="22" y="61" font-family="sans-serif" font-size="14" fill="#5a4d3e">10天打卡 · 趣味闯关</text>
    </g>

    <!-- Bottom button -->
    <rect x="70" y="165" width="200" height="22" rx="11" fill="#ffe66d" opacity="0.6"/>
  </g>
</svg>
