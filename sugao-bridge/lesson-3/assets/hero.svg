<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF5EE"/>
      <stop offset="0.55" stop-color="#FFE8D6"/>
      <stop offset="1" stop-color="#E8F8F5"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B6B"/>
      <stop offset="1" stop-color="#FF8A65"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ECDC4"/>
      <stop offset="1" stop-color="#3BBDB4"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#FF6B6B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="720" height="420" rx="24" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="46" text-anchor="middle" font-size="26" font-weight="800" fill="#FF6B6B">小数乘法和除法</text>
  <text x="360" y="72" text-anchor="middle" font-size="14" fill="#8A9298">苏教版 · 四年级升五年级 · 暑假衔接（五上 U4 / U6 核心算理）</text>

  <!-- Central node -->
  <g transform="translate(360,210)" filter="url(#sh)">
    <rect x="-78" y="-34" width="156" height="68" rx="34" fill="url(#brand)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">小数乘除</text>
    <text x="0" y="18" text-anchor="middle" font-size="12" fill="#FFE8D6">先当整数算，再点小数点</text>
  </g>

  <!-- Branch: 小数乘法 -->
  <g transform="translate(150,120)">
    <rect x="-118" y="-30" width="236" height="60" rx="16" fill="#FFFFFF" stroke="#FFD4C0" stroke-width="2"/>
    <circle cx="-94" cy="0" r="14" fill="url(#brand)"/>
    <text x="-94" y="5" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">×</text>
    <text x="36" y="-4" text-anchor="middle" font-size="16" font-weight="700" fill="#2D3436">小数乘法</text>
    <text x="36" y="16" text-anchor="middle" font-size="12" fill="#5A6268">因数共几位小数 → 积右起数几位</text>
  </g>

  <!-- Branch: 小数除法（除数是整数） -->
  <g transform="translate(570,120)">
    <rect x="-122" y="-30" width="244" height="60" rx="16" fill="#FFFFFF" stroke="#C9EFEB" stroke-width="2"/>
    <circle cx="98" cy="0" r="14" fill="url(#mint)"/>
    <text x="98" y="5" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">÷</text>
    <text x="-34" y="-4" text-anchor="middle" font-size="16" font-weight="700" fill="#2D3436">除数是整数</text>
    <text x="-34" y="16" text-anchor="middle" font-size="12" fill="#5A6268">商的小数点对齐被除数</text>
  </g>

  <!-- Branch: 小数除法（除数是小数） -->
  <g transform="translate(150,300)">
    <rect x="-122" y="-30" width="244" height="60" rx="16" fill="#FFFFFF" stroke="#C9EFEB" stroke-width="2"/>
    <circle cx="-98" cy="0" r="14" fill="url(#mint)"/>
    <text x="-98" y="5" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">÷</text>
    <text x="34" y="-4" text-anchor="middle" font-size="16" font-weight="700" fill="#2D3436">除数是小数</text>
    <text x="34" y="16" text-anchor="middle" font-size="12" fill="#5A6268">除数补成整数，被除数同移</text>
  </g>

  <!-- Branch: 判断与估算 -->
  <g transform="translate(570,300)">
    <rect x="-118" y="-30" width="236" height="60" rx="16" fill="#FFFFFF" stroke="#FFD4C0" stroke-width="2"/>
    <circle cx="94" cy="0" r="14" fill="url(#brand)"/>
    <text x="94" y="5" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">✓</text>
    <text x="-34" y="-4" text-anchor="middle" font-size="16" font-weight="700" fill="#2D3436">判断与估算</text>
    <text x="-34" y="16" text-anchor="middle" font-size="12" fill="#5A6268">积的小数位 = 两因数位之和</text>
  </g>

  <!-- Connectors -->
  <line x1="282" y1="150" x2="300" y2="186" stroke="#FFB3A0" stroke-width="3" stroke-linecap="round"/>
  <line x1="448" y1="150" x2="420" y2="186" stroke="#9FE3DD" stroke-width="3" stroke-linecap="round"/>
  <line x1="282" y1="270" x2="300" y2="234" stroke="#9FE3DD" stroke-width="3" stroke-linecap="round"/>
  <line x1="448" y1="270" x2="420" y2="234" stroke="#FFB3A0" stroke-width="3" stroke-linecap="round"/>

  <!-- Decoration dots -->
  <circle cx="40" cy="200" r="5" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="690" cy="210" r="6" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="42" cy="380" r="4" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="686" cy="384" r="5" fill="#FF6B6B" opacity="0.5"/>
</svg>
