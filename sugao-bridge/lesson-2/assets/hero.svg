<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" font-family="-apple-system, 'PingFang SC', 'Source Han Sans SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF5EE"/>
      <stop offset="0.5" stop-color="#FFE8D6"/>
      <stop offset="1" stop-color="#E8F8F5"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B6B"/>
      <stop offset="1" stop-color="#4ECDC4"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ECDC4"/>
      <stop offset="1" stop-color="#3bbdb4"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="720" height="480" rx="28" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="52" text-anchor="middle" font-size="26" font-weight="800" fill="#2D3436">多边形的面积 · 知识结构</text>
  <text x="360" y="78" text-anchor="middle" font-size="14" fill="#8A9298">平行四边形 / 三角形 / 梯形 —— 转化法求面积</text>

  <!-- Center root -->
  <g>
    <rect x="290" y="200" width="140" height="56" rx="16" fill="url(#brand)"/>
    <text x="360" y="234" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">多边形的面积</text>
  </g>

  <!-- Left branch: 平行四边形 -->
  <g>
    <line x1="290" y1="228" x2="150" y2="160" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="40" y="120" width="180" height="80" rx="14" fill="#fff" stroke="#FFD4C0" stroke-width="1.5"/>
    <polygon points="70,165 110,165 110,150 130,175 110,200 110,185 70,185" fill="#FF6B6B" opacity="0.15"/>
    <rect x="60" y="140" width="40" height="26" rx="6" fill="#FF6B6B" opacity="0.12"/>
    <text x="130" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#2D3436">平行四边形</text>
    <text x="130" y="178" text-anchor="middle" font-size="12.5" fill="#FF6B6B">面积 = 底 × 高</text>
  </g>

  <!-- Right branch: 三角形 -->
  <g>
    <line x1="430" y1="228" x2="570" y2="160" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="500" y="120" width="180" height="80" rx="14" fill="#fff" stroke="#FFD4C0" stroke-width="1.5"/>
    <polygon points="560,150 590,185 530,185" fill="#4ECDC4" opacity="0.18"/>
    <text x="590" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#2D3436">三角形</text>
    <text x="590" y="178" text-anchor="middle" font-size="12.5" fill="#4ECDC4">面积 = 底×高÷2</text>
  </g>

  <!-- Bottom branch: 梯形 -->
  <g>
    <line x1="360" y1="256" x2="360" y2="320" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="270" y="320" width="180" height="80" rx="14" fill="#fff" stroke="#FFD4C0" stroke-width="1.5"/>
    <polygon points="305,360 415,360 400,345 320,345" fill="#f59e0b" opacity="0.18"/>
    <text x="360" y="355" text-anchor="middle" font-size="15" font-weight="700" fill="#2D3436">梯形</text>
    <text x="360" y="378" text-anchor="middle" font-size="12.5" fill="#d97706">(上底+下底)×高÷2</text>
  </g>

  <!-- Key note -->
  <g>
    <rect x="40" y="420" width="640" height="40" rx="12" fill="#fff" stroke="#FFD4C0" stroke-width="1.5"/>
    <text x="360" y="445" text-anchor="middle" font-size="13.5" fill="#5A6268">💡 关键：底和高必须<tspan font-weight="700" fill="#FF6B6B">互相垂直对应</tspan> · 割补转化成长方形，面积不变</text>
  </g>
</svg>
